<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenEmmaLab</title>
    <meta
      name="description"
      content="OpenEmmaLab is building an open future for AI in Italy, starting with Emma."
    />
    <style>
      :root {
        color-scheme: light;
        --paper: #f4eadc;
        --ink: #6d3f31;
        --muted: rgba(109, 63, 49, 0.72);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        color: var(--ink);
        background: var(--paper);
        font-family:
          "Iowan Old Style", "Palatino Linotype", Palatino, "Book Antiqua",
          Georgia, serif;
      }

      main {
        min-height: 100vh;
        display: grid;
        align-items: center;
        padding: clamp(24px, 4vw, 56px);
      }

      .wrap {
        width: min(100%, 1120px);
        margin: 0 auto;
      }

      .language {
        position: fixed;
        top: clamp(18px, 4vw, 42px);
        right: clamp(18px, 4vw, 42px);
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-height: 32px;
        padding: 0;
        border: 0;
        color: var(--ink);
        background: transparent;
        font: inherit;
        font-size: 14px;
        letter-spacing: 0;
        cursor: pointer;
      }

      .language .inactive {
        color: var(--muted);
      }

      .language .divider {
        color: var(--muted);
      }

      h1 {
        margin: 0;
        max-width: 900px;
        font-size: clamp(52px, 10vw, 126px);
        font-weight: 400;
        line-height: 0.9;
        letter-spacing: 0;
        text-transform: lowercase;
      }

      .copy {
        margin-top: clamp(30px, 6vw, 72px);
        color: var(--muted);
        font-size: clamp(18px, 2.1vw, 28px);
        line-height: 1.22;
      }

      .copy p {
        margin: 0;
      }

      .copy span {
        display: block;
        margin-top: 0.25em;
        color: var(--ink);
      }

      [hidden] {
        display: none;
      }

      @media (max-width: 720px) {
        .language {
          font-size: 14px;
        }

        h1 {
          font-size: clamp(48px, 16vw, 82px);
        }
      }
    </style>
  </head>
  <body>
    <button class="language" type="button" aria-label="Switch language">
      <span data-code="en">EN</span>
      <span class="divider">/</span>
      <span class="inactive" data-code="it">IT</span>
    </button>
    <main>
      <section class="wrap" aria-label="OpenEmmaLab coming soon">
        <h1 data-heading>coming soon</h1>
        <div class="copy">
          <p lang="en" data-lang="en">
            Building an open future for AI in Italy
            <span>Starting with Emma</span>
          </p>
          <p lang="it" data-lang="it" hidden>
            Costruire un futuro aperto per l'AI in Italia
            <span>Partendo da Emma</span>
          </p>
        </div>
      </section>
    </main>
    <script>
      const button = document.querySelector(".language");
      const heading = document.querySelector("[data-heading]");
      const english = document.querySelector('[data-lang="en"]');
      const italian = document.querySelector('[data-lang="it"]');
      const englishCode = document.querySelector('[data-code="en"]');
      const italianCode = document.querySelector('[data-code="it"]');

      button.addEventListener("click", () => {
        const showItalian = italian.hidden;
        italian.hidden = !showItalian;
        english.hidden = showItalian;
        document.documentElement.lang = showItalian ? "it" : "en";
        heading.textContent = showItalian ? "prossimamente" : "coming soon";
        englishCode.classList.toggle("inactive", showItalian);
        italianCode.classList.toggle("inactive", !showItalian);
      });
    </script>
  </body>
</html>
